# Configuration for the Relation Classification model training
model:
    extractor:
        nhead: 4
        num_layers: 4
        dim_feedforward: 512
        layer_attn_nheads: 4
        dropout: 0.3
        timestep_embedding:
            enable: True
            mode: "mid"
    classifier: 
        mode: "multiclass"
        timestep_embedding_dim: 16
        nhead: 8
        num_layers: 4
        dim_feedforward: 512
        fc_ver: "v1"
        dropout: 0.3
    map_size: 16
    d_model: 256
    num_timesteps: 4
    architecture: "attention"


training:
    device: "cuda"
    lr: 0.00005
    weight_decay: 0.05
    num_epochs: 200
    early_stopping:
        patience: 10
        min_delta: 0.0
    checkpoint_interval: 5
    batch_size: 64
    shuffle: True
    exp_name: "flux_schnell"
    scheduler:
        enable: True
        factor: 0.5
        patience: 5
    timesteps: [1, 3]
    num_timesteps: 4
    data_size: -1  # if greater than 0, only uses "data_size" training samples rather than the full set
          

paths:
    dataset_folder_path: 
    - "/cortex/users/sapiry7/workspace/RELATION_CLASSIFIER_TRAINING_DATA/SCHNELL__GQA__IS_A__2000_400_200_ALL_timesteps/"
    - "/cortex/users/sapiry7/workspace/RELATION_CLASSIFIER_TRAINING_DATA/SCHNELL__ORM__above_below_left_right__white_green__800_100_70_ALL_timesteps/"

    checkpoint_dir: "/cortex/users/sapiry7/workspace/RELATION_CLASSIFIER_CHECKPOINTS/"
